# Hyperparameters per (algorithm, environment).
#
# Starting points: SB3 defaults adapted for continuous control. Tune from
# here — your report should explain what you changed and why. Anything you
# change should be a deliberate, defendable decision (the oral will ask).
#
# Conventions:
#   total_timesteps : training budget in env steps (summed across n_envs)
#   n_envs          : parallel envs for vectorized rollout
#   eval_freq       : env steps PER ENV between deterministic evaluations
#                     (so an eval happens every eval_freq * n_envs total steps)

ppo:
  hover:
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    learning_rate: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy_kwargs:
      net_arch: [64, 64]
    total_timesteps: 1000000
    n_envs: 8
    eval_freq: 25000

  waypoints:
    n_steps: 2048
    batch_size: 128
    n_epochs: 10
    learning_rate: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    # Small entropy bonus helps when the agent must explore far waypoints.
    ent_coef: 0.001
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy_kwargs:
      net_arch: [128, 128]
    total_timesteps: 3000000
    n_envs: 8
    eval_freq: 10000

  dogfight:
    n_steps: 4096
    batch_size: 256
    n_epochs: 10
    learning_rate: 1.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.005
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy_kwargs:
      net_arch: [256, 256]
    total_timesteps: 5000000
    n_envs: 8
    eval_freq: 100000

sac:
  hover:
    learning_rate: 3.0e-4
    buffer_size: 1000000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    ent_coef: auto
    policy_kwargs:
      net_arch: [256, 256]
    total_timesteps: 500000
    n_envs: 1   # SAC is off-policy; vec envs help less than for PPO
    eval_freq: 10000

  waypoints:
    learning_rate: 3.0e-4
    buffer_size: 1000000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    ent_coef: auto
    policy_kwargs:
      net_arch: [256, 256]
    total_timesteps: 1500000
    n_envs: 1
    eval_freq: 25000
